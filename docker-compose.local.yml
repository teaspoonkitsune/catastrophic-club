services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      APP_DB_NAME: catastrophic_club
      APP_DB_USER: catastrophic_club
      APP_DB_PASSWORD: catastrophic_club
      KEYCLOAK_DB_NAME: keycloak
      KEYCLOAK_DB_USER: keycloak
      KEYCLOAK_DB_PASSWORD: keycloak
    volumes:
      - local-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER"']
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - '127.0.0.1:5432:5432'

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - local-keycloak-data:/opt/keycloak/data
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import:ro
    ports:
      - '127.0.0.1:8080:8080'

volumes:
  local-postgres-data:
  local-keycloak-data:
