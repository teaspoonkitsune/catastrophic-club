services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: catastrophic-club-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8080
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./realm-import:/opt/keycloak/data/import:Z
      - keycloak-data:/opt/keycloak/data:Z

volumes:
  keycloak-data:
